<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Hub Admin</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
max-width:700px;
margin:auto;
}

h2{
color:#0d47a1;
}

input{
width:100%;
padding:12px;
margin:8px 0;
font-size:16px;
}

button{
padding:12px 20px;
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0b5ed7;
}
</style>
</head>

<body>

<h2>Mock Hub Admin Panel</h2>

<input id="question" placeholder="Question">

<input id="option1" placeholder="Option 1">

<input id="option2" placeholder="Option 2">

<input id="option3" placeholder="Option 3">

<input id="option4" placeholder="Option 4">

<input id="answer" type="number" placeholder="Correct Option (0-3)">

<button onclick="saveQuestion()">Add Question</button>

<script>

function saveQuestion(){

let questions=JSON.parse(localStorage.getItem("questions"))||[];

questions.push({

question:document.getElementById("question").value,

options:[
document.getElementById("option1").value,
document.getElementById("option2").value,
document.getElementById("option3").value,
document.getElementById("option4").value
],

answer:Number(document.getElementById("answer").value)

});

localStorage.setItem("questions",JSON.stringify(questions));

alert("Question Added Successfully");

location.reload();

}

</script>

</body>
</html>
