<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Hub Admin</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}
textarea{
width:100%;
height:250px;
}
button{
padding:12px 20px;
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
margin-top:10px;
}
</style>
</head>
<body>

<h2>Mock Hub Admin Panel</h2>

<p>Questions JSON</p>

<textarea id="data"></textarea>

<br>

<button onclick="saveData()">Save Questions</button>

<script>
document.getElementById("data").value =
localStorage.getItem("questions") || "[]";

function saveData(){
localStorage.setItem(
"questions",
document.getElementById("data").value
);

alert("Questions Saved Successfully");
}
</script>

</body>
</html>
